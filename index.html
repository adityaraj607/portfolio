<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Raj</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.12s ease, height 0.12s ease;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cursor::after {
    content: '';
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #cursor.clicked {
    width: 12px;
    height: 12px;
  }

  /* ── Background layers ── */
  .dot-grid {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #1c1c1c 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.04);
    animation: scan 7s linear infinite;
    pointer-events: none;
    z-index: 1;
  }



  /* ── Main content ── */
  .container {
    text-align: center;
    position: relative;
    z-index: 2;
    user-select: none;
  }

  .greeting {
    font-size: 12px;
    letter-spacing: 0.4em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.3s forwards;
  }

  .name {
    font-size: clamp(60px, 10vw, 110px);
    font-weight: 900;
    font-family: 'Arial Black', 'Arial Bold', sans-serif;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }
  .name .first { color: #fff; }
  .name .last {
    color: transparent;
    -webkit-text-stroke: 1.5px #fff;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.5em;
    color: #2e2e2e;
    text-transform: uppercase;
    margin-bottom: 72px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.7s forwards;
  }

  /* ── Social buttons ── */
  .socials {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.9s forwards;
  }

  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 24px;
    border: 1px solid #1f1f1f;
    color: #555;
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    position: relative;
    overflow: hidden;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #fff;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .social-btn:hover::before { transform: scaleX(1); }
  .social-btn:hover { color: #000; border-color: #fff; }
  .social-btn:hover .icon { filter: invert(1); }

  .icon, .social-btn span { position: relative; z-index: 1; }

  .icon {
    width: 14px;
    height: 14px;
    display: block;
  }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scan {
    from { top: -1px; }
    to   { top: 100vh; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="dot-grid"></div>
<div class="scan-line"></div>

<div class="container">
  <p class="greeting">Hello there — I'm</p>

  <h1 class="name">
    <span class="first">Aditya&nbsp;</span><span class="last">Raj</span>
  </h1>

  <p class="tagline">Developer &nbsp;·&nbsp; Builder &nbsp;·&nbsp; Creator</p>

  <div class="socials">

    <!-- LinkedIn -->
    <a class="social-btn" href="https://www.linkedin.com/in/aditya-raj-a2a91b36b" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/>
        <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
      </svg>
      <span>LinkedIn</span>
    </a>

    <!-- GitHub -->
    <a class="social-btn" href="https://github.com/adityaraj607" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
      </svg>
      <span>GitHub</span>
    </a>

    <!-- Instagram -->
    <a class="social-btn" href="https://www.instagram.com/raj.aditya.30/" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
      <span>Instagram</span>
    </a>

    <!-- LeetCode -->
    <a class="social-btn" href="https://leetcode.com/u/X8atQzPq33/" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <span>LeetCode</span>
    </a>

  </div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let cx = mx, cy = my;
  const ease = 0.18;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  document.addEventListener('mousedown', () => cursor.classList.add('clicked'));
  document.addEventListener('mouseup',   () => cursor.classList.remove('clicked'));

  function loop() {
    cx += (mx - cx) * ease;
    cy += (my - cy) * ease;
    cursor.style.left = cx + 'px';
    cursor.style.top  = cy + 'px';
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
